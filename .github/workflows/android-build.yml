name: Build Native Android APK
on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]
  workflow_dispatch:

jobs:
  build:
    name: Build Native APK
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.4'
        
      - name: Build Android APK
        run: gradle assembleDebug

      - name: Rename APK
        run: mv app/build/outputs/apk/debug/app-debug.apk ZestyySports.apk

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ZestyySports
          path: ZestyySports.apk

      - name: Create Release
        if: github.event_name == 'push'
        uses: ncipollo/release-action@v1
        with:
          artifacts: "ZestyySports.apk"
          tag: "latest"
          name: "Latest Auto-Build"
          body: "Auto-generated APK."
          allowUpdates: true
          makeLatest: true
